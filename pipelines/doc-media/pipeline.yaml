name: doc-media
description: "飞书文档图片/附件：insert / download。auth 由 _constructor 自动处理。"
required_scope: "drive:drive docx:document"
triggers:
  - "文档图片"
  - "文档附件"
  - "doc media"
input:
  open_id: string
  action: string
  document_id: string
  file_path: string
  type: string
  align: string
  caption: string
  resource_token: string
  resource_type: string
  output_path: string
  scope: string
steps:
  - name: execute
    type: code
    command: "node steps/execute.mjs"
output: execute
