name: chat
description: "飞书群组管理（搜索/查详情/列成员，3 action）。auth 由 _constructor 自动处理。"
required_scope: "im:chat:readonly im:chat.members:read"
triggers:
  - "群组"
  - "chat"
  - "创建群"
  - "查群"
input:
  open_id: string
  action: string
  query: string
  chat_id: string
  user_id_type: string
  page_size: integer
  page_token: string
  exclude_bots: boolean
  scope: string
steps:
  - name: execute
    type: code
    command: "node steps/execute.mjs"
output: execute
