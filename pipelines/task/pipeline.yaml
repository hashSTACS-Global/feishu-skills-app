name: task
description: "飞书任务管理（创建/更新/查询任务）。auth 由 _constructor 自动处理。"
required_scope: "task:task:read task:task:write task:tasklist:read task:tasklist:write task:comment:read task:comment:write"
triggers:
  - "任务"
  - "task"
  - "创建任务"
input:
  open_id: string
  action: string
  scope: string
steps:
  - name: execute
    type: code
    command: "node steps/execute.mjs"
output: execute
