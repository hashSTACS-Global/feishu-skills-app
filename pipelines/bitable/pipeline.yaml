name: bitable
description: "飞书多维表格管理：应用/数据表/字段/记录/视图（25 个 action）。auth 由 _constructor 自动处理。"
required_scope: "bitable:app drive:drive"
triggers:
  - "多维表格"
  - "bitable"
  - "创建多维表格"
  - "查询多维表格"
  - "新建数据表"
  - "添加字段"
  - "插入记录"
  - "更新记录"
  - "查看视图"
input:
  open_id: string
  action: string
  app_token: string
  table_id: string
  field_id: string
  record_id: string
  view_id: string
  name: string
  fields: object
  records: array
  filter: string
  sort: string
  page_size: integer
  page_token: string
  folder_token: string
  field_type: integer
  property: object
  view_type: string
  record_ids: array
  table_ids: array
  table_names: array
  scope: string
steps:
  - name: execute
    type: code
    command: "node steps/execute.mjs"
output: execute
